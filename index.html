<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>50th Anniversary</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#f29600 0%,#e60012 65%);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  .card{
    background:rgba(255,255,255,0.97);
    border-radius:4px;
    padding:56px 48px 48px;
    width:360px;
    box-shadow:0 24px 64px rgba(0,0,0,0.22);
    text-align:center;
  }
  .logo-mark{
    width:64px;height:64px;margin:0 auto 28px;
    background:linear-gradient(135deg,#f29600,#e60012);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:700;color:#fff;letter-spacing:-1px;
  }
  h1{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:6px;letter-spacing:.04em;}
  p{font-size:13px;color:#888;margin-bottom:32px;line-height:1.6;}
  label{display:block;font-size:12px;font-weight:600;color:#555;text-align:left;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;}
  input{
    width:100%;padding:14px 16px;
    border:1.5px solid #ddd;border-radius:3px;
    font-size:16px;letter-spacing:.12em;color:#1a1a1a;
    outline:none;transition:border-color .2s;
  }
  input:focus{border-color:#f29600;}
  .btn{
    margin-top:16px;width:100%;padding:15px;
    background:linear-gradient(90deg,#f29600,#e60012);
    border:none;border-radius:3px;
    color:#fff;font-size:15px;font-weight:600;letter-spacing:.08em;
    cursor:pointer;transition:opacity .2s;
  }
  .btn:hover{opacity:.88;}
  .error{
    margin-top:12px;font-size:13px;color:#e60012;
    min-height:20px;opacity:0;transition:opacity .2s;
  }
  .error.show{opacity:1;}
</style>
</head>
<body>
<div class="card">
  <div class="logo-mark">50</div>
  <h1>コンテンツの確認</h1>
  <p>パスワードを入力してください。</p>
  <label for="pw">PASSWORD</label>
  <input type="password" id="pw" placeholder="••••••••••••" autocomplete="off">
  <button class="btn" onclick="check()">VIEW</button>
  <div class="error" id="err">パスワードが違います。</div>
</div>
<script>
  // セッション中はパスワード不要
  if(sessionStorage.getItem('auth')==='ok') location.replace('view.html');

  const HASH = '0b77b025f6e989bdf77c31af74551061dab894aa63838d4994e052faa478b4de';

  async function sha256(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function check(){
    const v = document.getElementById('pw').value;
    const err = document.getElementById('err');
    const h = await sha256(v);
    if(h === HASH){
      sessionStorage.setItem('auth','ok');
      location.replace('view.html');
    } else {
      err.classList.add('show');
      document.getElementById('pw').value='';
      document.getElementById('pw').focus();
      setTimeout(()=>err.classList.remove('show'),2600);
    }
  }
  document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter') check();});
</script>
</body>
</html>
